<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Administrator - Life Fountain College</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', Arial, sans-serif; margin:0; color:#fff; background: url('logo.png.jpeg') center/cover no-repeat; }
  body::before { content:""; position:fixed; inset:0; background:rgba(0,0,0,0.32); z-index:0; }

  header { background:#003366; color:white; padding:20px; padding-left:220px; position:relative; z-index:1; }
  header h1 { font-family:'Playfair Display',Georgia,serif; text-transform:uppercase; letter-spacing:2px; margin:0; font-weight:900; font-size:2rem; text-shadow:0 3px 8px rgba(0,0,0,0.4); }

  .dropdown { display:block; position:fixed; left:0; top:0; height:100%; width:200px; background:#003366; padding-top:80px; box-shadow:2px 0 8px rgba(0,0,0,0.15); text-align:left; z-index:1000; }
  .dropdown a { display:block; padding:12px 18px; color:white; text-decoration:none; border-bottom:1px solid rgba(255,255,255,0.04); }
  .dropdown a:hover { background:rgba(255,255,255,0.06); }

  section { margin-left:220px; padding:30px; z-index:1; position:relative; }

  .card { background:rgba(0,0,0,0.5); padding:22px; border-radius:8px; max-width:900px; margin:auto; margin-bottom:20px; }
  h2 { margin-top:0; font-family:'Playfair Display',Georgia,serif; }

  .form-group { margin-bottom:14px; text-align:left; }
  .form-group label { display:block; font-size:12px; color:rgba(255,255,255,0.6); margin-bottom:5px; }
  input[type="password"] { width:100%; padding:9px 12px; border-radius:4px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.07); color:white; font-family:'Poppins',sans-serif; font-size:14px; outline:none; box-sizing:border-box; }
  input[type="password"]:focus { border-color:rgba(255,255,255,0.4); }

  .btn { padding:10px 16px; border:none; border-radius:6px; cursor:pointer; font-family:'Poppins',sans-serif; font-size:14px; }
  .btn-primary { background:#007bff; color:white; }
  .btn-primary:hover { background:#0062cc; }
  .btn-primary:disabled { background:#555; cursor:not-allowed; }
  .btn-danger { background:crimson; color:white; }
  .btn-danger:hover { background:#a00; }

  .error-msg { background:rgba(220,53,69,0.18); border:1px solid rgba(220,53,69,0.4); color:#ff8a94; font-size:13px; padding:9px 12px; border-radius:6px; margin-bottom:14px; display:none; }

  table { width:100%; border-collapse:collapse; }
  th, td { border:1px solid rgba(255,255,255,0.2); padding:8px; font-size:13px; }
  th { background:rgba(0,0,0,0.3); }

  select, textarea { width:100%; padding:8px; border-radius:4px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.07); color:white; font-family:'Poppins',sans-serif; font-size:13px; box-sizing:border-box; }
  textarea { height:300px; margin-top:8px; }

  footer { background:#003366; color:white; padding:15px; margin-top:40px; text-align:center; position:relative; z-index:1; }
  .motto { font-style:italic; }
</style>
</head>
<body>

  <div class="dropdown">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="gallery.html">School Gallery</a>
    <a href="admissions.html">Admissions</a>
    <a href="admin.html">Admin</a>
  </div>

  <header>
    <h1>Life Fountain College - Admin</h1>
  </header>

  <section>

    <!-- LOGIN CARD -->
    <div class="card" id="login-card">
      <h2>Administrator Login</h2>
      <p style="color:rgba(255,255,255,0.7); font-size:14px;">Only authorized staff may access this panel.</p>

      <div class="error-msg" id="loginError"></div>

      <div class="form-group">
        <label>Passcode</label>
        <input type="password" id="adminPass" placeholder="Enter passcode">
      </div>
      <button class="btn btn-primary" id="loginBtn">Login</button>
    </div>

    <!-- DASHBOARD -->
    <div class="card" id="dashboard" style="display:none;">
      <h2>Admission Applications</h2>
      <div id="appList"></div>
      <button class="btn btn-danger" id="logoutBtn" style="margin-top:16px;">Logout</button>
    </div>

    <!-- PAGE EDITOR (injected after login) -->

  </section>

  <footer>
    <p class="motto">"Bedrock of Excellence"</p>
    <p>&copy; 2026 Life Fountain College. All rights reserved.</p>
  </footer>

<script>
  /* ── HELPERS ── */
  function esc(str){
    return String(str ?? '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function showError(msg){
    const el = document.getElementById('loginError');
    el.textContent = msg;
    el.style.display = 'block';
  }

  /* ── RESTORE SESSION ── */
  window.addEventListener('DOMContentLoaded', () => {
    if(sessionStorage.getItem('adminAuth') === '1'){
      showDashboard();
    }
  });

  /* ── LOGIN ── */
  document.getElementById('loginBtn').addEventListener('click', () => {
    const p = document.getElementById('adminPass').value.trim();
    const btn = document.getElementById('loginBtn');

    if(!p){ showError('Please enter a passcode.'); return; }

    btn.disabled = true;
    btn.textContent = 'Checking…';

    fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ passcode: p })
    })
    .then(r => r.json())
    .then(resp => {
      if(resp.success){
        sessionStorage.setItem('adminAuth', '1');
        showDashboard();
      } else {
        showError(resp.error || 'Incorrect passcode.');
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    })
    .catch(() => {
      showError('Network error. Make sure the server is running.');
      btn.disabled = false;
      btn.textContent = 'Login';
    });
  });

  /* ── ENTER KEY ── */
  document.getElementById('adminPass').addEventListener('keydown', e => {
    if(e.key === 'Enter') document.getElementById('loginBtn').click();
  });

  /* ── LOGOUT ── */
  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('adminAuth');
    document.getElementById('adminPass').value = '';
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-card').style.display = 'block';
  });

  /* ── SHOW DASHBOARD ── */
  let editorLoaded = false;

  function showDashboard(){
    document.getElementById('login-card').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadApplications();
    if(!editorLoaded){
      editorLoaded = true;
      loadEditor();
    }
  }

  /* ── LOAD APPLICATIONS ── */
  function loadApplications(){
    fetch('/applications')
      .then(r => r.json())
      .then(apps => {
        if(!apps.length){
          document.getElementById('appList').innerHTML = '<p>No applications yet.</p>';
          return;
        }
        let html = '<table><thead><tr><th>Name</th><th>Email</th><th>Program</th><th>Note</th><th>Date</th></tr></thead><tbody>';
        apps.forEach(a => {
          html += `<tr>
            <td>${esc(a.name)}</td>
            <td>${esc(a.email)}</td>
            <td>${esc(a.program)}</td>
            <td>${esc(a.note)}</td>
            <td>${new Date(a.date).toLocaleString()}</td>
          </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('appList').innerHTML = html;
      })
      .catch(() => {
        document.getElementById('appList').innerHTML = '<p>Error loading applications.</p>';
      });
  }

  /* ── PAGE EDITOR ── */
  function loadEditor(){
    const pages = ['index.html','about.html','gallery.html','admissions.html','admin.html'];

    const html = `
      <div class="card" id="editor-card">
        <h2>Page Editor</h2>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          <select id="pageSelect">
            ${pages.map(p => `<option value="${p}">${p}</option>`).join('')}
          </select>
          <button class="btn btn-primary" id="loadPage">Load Page</button>
        </div>
        <textarea id="pageContent" placeholder="Page HTML will appear here after loading…"></textarea>
        <div style="margin-top:10px; display:flex; gap:10px;">
          <button class="btn btn-primary" id="savePage">Save</button>
          <button class="btn btn-primary" id="previewPage">Preview</button>
        </div>
        <p id="saveMsg" style="color:#75e8a6; font-size:13px; margin-top:8px; display:none;">Page saved successfully.</p>
      </div>`;

    document.querySelector('section').insertAdjacentHTML('beforeend', html);

    document.getElementById('loadPage').addEventListener('click', loadSelectedPage);
    document.getElementById('savePage').addEventListener('click', savePage);
    document.getElementById('previewPage').addEventListener('click', previewPage);
  }

  function loadSelectedPage(){
    const page = document.getElementById('pageSelect').value;
    fetch('/page/' + page + '/edited')
      .then(r => r.text())
      .then(t => {
        if(t && t.trim().length){
          document.getElementById('pageContent').value = t;
        } else {
          return fetch(page).then(r => r.text()).then(orig => {
            document.getElementById('pageContent').value = orig;
          });
        }
      })
      .catch(() => alert('Could not load page.'));
  }

  function savePage(){
    const page    = document.getElementById('pageSelect').value;
    const content = document.getElementById('pageContent').value;

    fetch('/page/' + page, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    })
    .then(r => r.json())
    .then(resp => {
      const msg = document.getElementById('saveMsg');
      if(resp.success){
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
      } else {
        alert('Failed to save page.');
      }
    })
    .catch(() => alert('Network error.'));
  }

  function previewPage(){
    const content = document.getElementById('pageContent').value;
    const w = window.open();
    w.document.write(content);
    w.document.close();
  }
</script>

</body>
</html>
