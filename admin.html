<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Administrator - Life Fountain College</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Poppins', Arial, sans-serif; margin:0; color:#fff; background: url('logo.png.jpeg') center/cover no-repeat; }
  body::before { content:""; position: fixed; inset:0; background: rgba(0,0,0,0.32); z-index:0; }
  header{ background:#003366; color:white; padding:20px; padding-left:220px; position:relative; z-index:1; }
  header h1{ font-family:'Playfair Display', Georgia, serif; text-transform:uppercase; letter-spacing:2px; margin:0; font-weight:900; font-size:2rem; text-shadow:0 3px 8px rgba(0,0,0,0.4); }
  .dropdown{ display:block; position:fixed; left:0; top:0; height:100%; width:200px; background:#003366; color:white; padding-top:80px; box-shadow:2px 0 8px rgba(0,0,0,0.15); text-align:left; z-index:1000; }
  .dropdown a{ display:block; padding:12px 18px; color:white; text-decoration:none; border-bottom:1px solid rgba(255,255,255,0.04); }
  .dropdown a:hover{ background:rgba(255,255,255,0.06); }
  section{ margin-left:220px; padding:30px; z-index:1; position:relative; }
  .card{ background: rgba(0,0,0,0.5); padding:22px; border-radius:8px; max-width:900px; margin:auto; }
  h2{ margin-top:0; font-family:'Playfair Display', Georgia, serif; }
  input{ width:100%; padding:8px; border-radius:4px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.03); color:white; }
  button{ padding:10px 16px; background:#007bff; color:white; border:none; border-radius:6px; cursor:pointer; }
  table{ width:100%; border-collapse:collapse; }
  th,td{ border:1px solid rgba(255,255,255,0.2); padding:8px; }
  th{ background:rgba(0,0,0,0.3); }
</style>
</head>
<body>
<script>
// redirect to port 3000 if not already there
if(location.port !== "3000"){
  location.href = "http://localhost:3000" + location.pathname + location.search + location.hash;
}
</script>
<script>
(function(){
  const filename = location.pathname.split('/').pop();
  fetch('/page/'+filename+'/edited')
    .then(r=>{
      if(r.ok) return r.text();
      return '';
    })
    .then(t=>{
      if(t && t.trim().length){
        document.open();
        document.write(t);
        document.close();
      }
    })
    .catch(e=>console.error('Failed to load edited page:', e));
})();
</script>
  <div class="dropdown" id="menu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="gallery.html">School Gallery</a>
    <a href="admissions.html">Admissions</a>
    <a href="admin.html">Admin</a>
  </div>

  <header>
    <h1>Life Fountain College - Admin</h1>
  </header>

  <section>
    <div class="card" id="login-card">
      <h2>Administrator Login</h2>
      <p>Only authorized staff may access the administration panel. Enter your passcode to continue.</p>
      <div class="row">
        <input type="password" id="adminPass" placeholder="Passcode">
      </div>
      <button id="loginBtn">Login</button>
      <p id="loginError" style="color:#ff6b6b; display:none; margin-top:8px;"></p>
    </div>

    <div class="card" id="dashboard" style="display:none;">
      <h2>Admission Applications</h2>
      <div id="appList"></div>
      <button id="logoutBtn">Logout</button>
    </div>
  </section>

  <footer>
    <p class="motto">"Bedrock of Excellence"</p>
    <p>&copy; 2026 Life Fountain College. All rights reserved.</p>
  </footer>

<script>
// passcodes are now validated on the server; this constant is no longer used
// const validCodes = ['admin123','pass2026'];

function showDashboard(){
  document.getElementById('login-card').style.display='none';
  document.getElementById('dashboard').style.display='block';
  loadApplications();
  loadEditor(); // initialize page editor
}

function loadApplications(){
  fetch('/applications')
    .then(r=>r.json())
    .then(apps=>{
      if(!apps.length){
        document.getElementById('appList').innerHTML='<p>No applications yet.</p>';
        return;
      }
      let html='<table><thead><tr><th>Name</th><th>Email</th><th>Program</th><th>Note</th><th>Date</th></tr></thead><tbody>';
      apps.forEach(a=>{
        html+=`<tr><td>${a.name}</td><td>${a.email}</td><td>${a.program}</td><td>${a.note}</td><td>${new Date(a.date).toLocaleString()}</td></tr>`;
      });
      html+='</tbody></table>';
      document.getElementById('appList').innerHTML=html;
    })
    .catch(err=>{
      console.error(err);
      document.getElementById('appList').innerHTML='<p>Error loading applications.</p>';
    });
}

document.getElementById('loginBtn').addEventListener('click',()=>{
  const p = document.getElementById('adminPass').value.trim();
  fetch('/admin/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({passcode:p})
  }).then(r=>r.json()).then(resp=>{
    if(resp.success){
      showDashboard();
    } else {
      const err = document.getElementById('loginError');
      err.textContent='Incorrect passcode.';
      err.style.display='block';
    }
  }).catch(()=>{
    const err = document.getElementById('loginError');
    err.textContent='Network error.';
    err.style.display='block';
  });
});

document.getElementById('logoutBtn').addEventListener('click',()=>{
  document.getElementById('adminPass').value='';
  document.getElementById('loginError').style.display='none';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('login-card').style.display='block';
});

// --- Page editor functions ---
function loadEditor(){
  const pages=[
    'index.html','about.html','gallery.html','admissions.html','admin.html'
  ];
  let html='<h2>Page Editor</h2>'+
           '<select id="pageSelect">';
  pages.forEach(p=> html+=`<option value="${p}">${p}</option>`);
  html+='</select> '+
        '<button id="loadPage">Load</button>';
  html+='<div style="margin-top:12px;"><textarea id="pageContent" style="width:100%;height:300px;"></textarea></div>';
  html+='<button id="savePage">Save</button> ';
  html+='<button id="previewPage">Preview</button>';
  document.getElementById('dashboard').insertAdjacentHTML('beforeend', html);
  document.getElementById('loadPage').addEventListener('click', loadSelectedPage);
  document.getElementById('savePage').addEventListener('click', savePage);
  document.getElementById('previewPage').addEventListener('click', previewPage);
}

function loadSelectedPage(){
  const page=document.getElementById('pageSelect').value;
  fetch('/page/'+page+'/edited')
    .then(r=>r.text())
    .then(t=>{
      if(t && t.trim().length){
        document.getElementById('pageContent').value=t;
      } else {
        return fetch(page).then(r=>r.text()).then(orig=>{
          document.getElementById('pageContent').value=orig;
        });
      }
    });
}

function savePage(){
  const page=document.getElementById('pageSelect').value;
  const content=document.getElementById('pageContent').value;
  fetch('/page/'+page, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({content})
  }).then(r=>r.json()).then(resp=>{
    if(resp.success){
      alert('Page saved on server. Visitors will see the edited version.');
    } else {
      alert('Failed to save page.');
    }
  }).catch(()=>alert('Network error.'));
}

function previewPage(){
  const content=document.getElementById('pageContent').value;
  const w=window.open();
  w.document.write(content);
  w.document.close();
}
</script>

</body>
</html>
