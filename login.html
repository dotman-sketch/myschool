<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFE FOUNTAIN COLLEGE - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: url('logo.png.jpeg') no-repeat center center / cover;
      position: relative;
      color: white;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 0;
    }

    .login-container {
      position: relative;
      z-index: 1;
      background: rgba(0,0,0,0.72);
      padding: 36px 32px;
      border-radius: 12px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .school-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 24px;
      line-height: 1.6;
      color: #fff;
    }

    .step { display: none; }
    .step.active { display: block; }

    .step-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 14px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 5px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: rgba(255,255,255,0.07);
      color: white;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.1);
    }

    .form-group input::placeholder { color: rgba(255,255,255,0.3); }

    /* OTP boxes */
    .otp-boxes {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 16px 0;
    }

    .otp-boxes input {
      width: 56px;
      height: 60px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      color: white;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'Montserrat', sans-serif;
    }

    .otp-boxes input:focus {
      border-color: #007bff;
      background: rgba(0,123,255,0.1);
    }

    .otp-hint {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 16px;
    }

    .otp-hint span { color: #ffc107; font-weight: 600; }

    .error-msg {
      background: rgba(220,53,69,0.18);
      border: 1px solid rgba(220,53,69,0.4);
      color: #ff8a94;
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
      display: none;
      text-align: left;
    }

    .btn-primary {
      width: 100%;
      padding: 11px;
      margin-top: 4px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #0062cc; }
    .btn-primary:disabled { background: #555; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      background: transparent;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.07); }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.12);
    }

    .link-btn {
      background: none;
      border: none;
      color: #ffc107;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      text-decoration: underline;
      margin-top: 12px;
      display: block;
      width: 100%;
      text-align: center;
    }

    .resend-row {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 14px;
    }

    .resend-row button {
      background: none;
      border: none;
      color: #ffc107;
      cursor: pointer;
      font-size: 13px;
      text-decoration: underline;
      font-family: 'Poppins', sans-serif;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 14px 20px;
      background: rgba(0,0,0,0.75);
      color: white;
      width: 100%;
      font-family: 'Montserrat', sans-serif;
      margin-top: 20px;
    }

    footer .motto { font-style: italic; font-size: 13px; opacity: 0.9; }
    footer .copyright { font-size: 11px; margin-top: 4px; opacity: 0.65; }
  </style>
</head>
<body>

  <div class="login-container">
    <p class="school-name">Life Fountain College<br>Ago Are / Ofiki Portal</p>

    <!-- STEP 1: EMAIL -->
    <div class="step active" id="step1">
      <p class="step-label">Step 1 of 2 — Enter your email</p>
      <div class="error-msg" id="step1Error"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="Enter your email" autocomplete="email">
      </div>

      <button class="btn-primary" id="sendOtpBtn">Send Code</button>

      <div class="divider">or</div>
      <button class="btn-secondary" onclick="window.location.href='signup.html'">Create Account</button>
      <button class="link-btn" onclick="openForgot()">Forgot Password?</button>
    </div>

    <!-- STEP 2: OTP -->
    <div class="step" id="step2">
      <p class="step-label">Step 2 of 2 — Enter your code</p>
      <p class="otp-hint">A 4-digit code was sent to<br><span id="emailDisplay"></span></p>

      <div class="error-msg" id="step2Error"></div>

      <div class="otp-boxes">
        <input type="text" maxlength="1" id="otp1" inputmode="numeric">
        <input type="text" maxlength="1" id="otp2" inputmode="numeric">
        <input type="text" maxlength="1" id="otp3" inputmode="numeric">
        <input type="text" maxlength="1" id="otp4" inputmode="numeric">
      </div>

      <button class="btn-primary" id="verifyBtn">Verify & Login</button>
      <button class="btn-secondary" onclick="goBack()">Back</button>

      <div class="resend-row">
        Didn't get the code? <button onclick="resendOtp()">Resend</button>
      </div>
    </div>

    <!-- FORGOT PASSWORD -->
    <div class="step" id="stepForgot">
      <p class="step-label">Reset Password</p>
      <div class="error-msg" id="forgotError"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="forgotEmail" placeholder="Enter your email">
      </div>
      <div class="form-group" id="forgotOtpGroup" style="display:none;">
        <label>Reset Code</label>
        <input type="text" id="forgotOtp" placeholder="Enter 4-digit code" maxlength="4" inputmode="numeric">
      </div>
      <div class="form-group" id="forgotPassGroup" style="display:none;">
        <label>New Password</label>
        <input type="password" id="forgotNewPass" placeholder="New password (min 6 chars)">
      </div>

      <button class="btn-primary" id="forgotBtn">Send Reset Code</button>
      <button class="btn-secondary" onclick="closeForgot()">Back to Login</button>
    </div>

  </div>

  <footer>
    <p class="motto">"Bedrock of Excellence"</p>
    <p class="copyright">&copy; 2026 Life Fountain College, Ago Are/Ofiki. All rights reserved.</p>
  </footer>

<script>
  /* ── ALREADY LOGGED IN ── */
  if(sessionStorage.getItem('loggedInUser')){
    window.location.replace('index.html');
  }

  let currentEmail = '';
  let forgotStep   = 1;

  /* ── HELPERS ── */
  function showError(id, msg){
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearError(id){
    const el = document.getElementById(id);
    el.textContent = '';
    el.style.display = 'none';
  }
  function showStep(id){
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  /* ── STEP 1: SEND OTP ── */
  document.getElementById('sendOtpBtn').addEventListener('click', sendOtp);
  document.getElementById('loginEmail').addEventListener('keydown', e => {
    if(e.key === 'Enter') sendOtp();
  });

  function sendOtp(){
    const email = document.getElementById('loginEmail').value.trim();
    clearError('step1Error');

    if(!email){ showError('step1Error', 'Please enter your email.'); return; }

    const btn = document.getElementById('sendOtpBtn');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    fetch('/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    })
    .then(r => r.json())
    .then(resp => {
      if(resp.success){
        currentEmail = email;
        document.getElementById('emailDisplay').textContent = email;
        showStep('step2');
        document.getElementById('otp1').focus();
      } else {
        showError('step1Error', resp.error || 'Could not send code.');
      }
      btn.disabled = false;
      btn.textContent = 'Send Code';
    })
    .catch(() => {
      showError('step1Error', 'Network error. Make sure server is running.');
      btn.disabled = false;
      btn.textContent = 'Send Code';
    });
  }

  /* ── OTP BOX AUTO-ADVANCE ── */
  ['otp1','otp2','otp3','otp4'].forEach((id, i, arr) => {
    const input = document.getElementById(id);
    input.addEventListener('input', () => {
      input.value = input.value.replace(/\D/g, '');
      if(input.value && i < arr.length - 1){
        document.getElementById(arr[i+1]).focus();
      }
      if(i === arr.length - 1 && input.value){
        verifyOtp();
      }
    });
    input.addEventListener('keydown', e => {
      if(e.key === 'Backspace' && !input.value && i > 0){
        document.getElementById(arr[i-1]).focus();
      }
    });
  });

  /* ── STEP 2: VERIFY OTP ── */
  document.getElementById('verifyBtn').addEventListener('click', verifyOtp);

  function verifyOtp(){
    const otp = ['otp1','otp2','otp3','otp4']
      .map(id => document.getElementById(id).value)
      .join('');
    clearError('step2Error');

    if(otp.length < 4){ showError('step2Error', 'Please enter the full 4-digit code.'); return; }

    const btn = document.getElementById('verifyBtn');
    btn.disabled = true;
    btn.textContent = 'Verifying…';

    fetch('/verify-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: currentEmail, otp })
    })
    .then(r => r.json())
    .then(resp => {
      if(resp.success){
        sessionStorage.setItem('loggedInUser', resp.name || currentEmail);
        window.location.replace('index.html');
      } else {
        showError('step2Error', resp.error || 'Incorrect code.');
        ['otp1','otp2','otp3','otp4'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('otp1').focus();
        btn.disabled = false;
        btn.textContent = 'Verify & Login';
      }
    })
    .catch(() => {
      showError('step2Error', 'Network error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Verify & Login';
    });
  }

  /* ── RESEND OTP ── */
  function resendOtp(){
    fetch('/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: currentEmail })
    })
    .then(r => r.json())
    .then(resp => {
      if(resp.success){
        clearError('step2Error');
        ['otp1','otp2','otp3','otp4'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('otp1').focus();
        alert('A new code has been sent to ' + currentEmail);
      } else {
        showError('step2Error', resp.error || 'Could not resend code.');
      }
    })
    .catch(() => showError('step2Error', 'Network error.'));
  }

  /* ── BACK ── */
  function goBack(){
    showStep('step1');
    ['otp1','otp2','otp3','otp4'].forEach(id => document.getElementById(id).value = '');
    clearError('step2Error');
  }

  /* ── FORGOT PASSWORD ── */
  function openForgot(){
    forgotStep = 1;
    clearError('forgotError');
    document.getElementById('forgotEmail').value   = '';
    document.getElementById('forgotOtp').value     = '';
    document.getElementById('forgotNewPass').value = '';
    document.getElementById('forgotOtpGroup').style.display  = 'none';
    document.getElementById('forgotPassGroup').style.display = 'none';
    document.getElementById('forgotBtn').textContent = 'Send Reset Code';
    showStep('stepForgot');
  }

  function closeForgot(){ showStep('step1'); }

  document.getElementById('forgotBtn').addEventListener('click', () => {
    if(forgotStep === 1) sendForgotOtp();
    else resetPassword();
  });

  function sendForgotOtp(){
    const email = document.getElementById('forgotEmail').value.trim();
    clearError('forgotError');

    if(!email){ showError('forgotError', 'Please enter your email.'); return; }

    const btn = document.getElementById('forgotBtn');
    btn.disabled = true;
    btn.textContent = 'Sending…';

    fetch('/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    })
    .then(r => r.json())
    .then(resp => {
      if(resp.success){
        forgotStep = 2;
        document.getElementById('forgotOtpGroup').style.display  = 'block';
        document.getElementById('forgotPassGroup').style.display = 'block';
        document.getElementById('forgotEmail').disabled = true;
        btn.textContent = 'Reset Password';
        btn.disabled = false;
      } else {
        showError('forgotError', resp.error || 'Could not send code.');
        btn.disabled = false;
        btn.textContent = 'Send Reset Code';
      }
    })
    .catch(() => {
      showError('forgotError', 'Network error.');
      btn.disabled = false;
      btn.textContent = 'Send Reset Code';
    });
  }

  function resetPassword(){
    const email       = document.getElementById('forgotEmail').value.trim();
    const otp         = document.getElementById('forgotOtp').value.trim();
    const newPassword = document.getElementById('forgotNewPass').value;
    clearError('forgotError');

    if(!otp || !newPassword){ showError('forgotError', 'Please fill in all fields.'); return; }
    if(newPassword.length < 6){ showError('forgotError', 'Password must be at least 6 characters.'); return; }

    const btn = document.getElementById('forgotBtn');
    btn.disabled = true;
    btn.textContent = 'Resetting…';

    fetch('/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, otp, newPassword })
    })
    .then(r => r.json())
    .then(resp => {
      if(resp.success){
        alert('Password reset successfully! You can now log in.');
        closeForgot();
      } else {
        showError('forgotError', resp.error || 'Could not reset password.');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    })
    .catch(() => {
      showError('forgotError', 'Network error.');
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    });
  }
</script>

</body>
</html>
