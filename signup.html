<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFE FOUNTAIN COLLEGE - Sign Up</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: url('logo.png.jpeg') no-repeat center center / cover;
      position: relative;
      color: white;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 0;
    }

    .signup-container {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.72);
      padding: 36px 32px;
      border-radius: 12px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .school-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 24px;
      line-height: 1.5;
      color: #fff;
    }

    .form-group {
      margin-bottom: 14px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 5px;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: rgba(255,255,255,0.07);
      color: white;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.1);
    }

    .form-group input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .error-msg {
      background: rgba(220, 53, 69, 0.18);
      border: 1px solid rgba(220, 53, 69, 0.4);
      color: #ff8a94;
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
      display: none;
      text-align: left;
    }

    .success-msg {
      background: rgba(25, 135, 84, 0.18);
      border: 1px solid rgba(25, 135, 84, 0.4);
      color: #75e8a6;
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
      display: none;
      text-align: left;
    }

    .password-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      text-align: left;
      margin-top: -8px;
      margin-bottom: 10px;
    }

    .btn-primary {
      width: 100%;
      padding: 11px;
      margin-top: 6px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #0062cc; }
    .btn-primary:active { background: #004fa3; }
    .btn-primary:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .btn-secondary {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      background: transparent;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.35);
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 14px 20px;
      background: rgba(0, 0, 0, 0.75);
      color: white;
      width: 100%;
      font-family: 'Montserrat', sans-serif;
      margin-top: 20px;
    }

    footer .motto {
      font-style: italic;
      font-size: 13px;
      opacity: 0.9;
    }

    footer .copyright {
      font-size: 11px;
      margin-top: 4px;
      opacity: 0.65;
    }
  </style>
</head>

<body>

  <div class="signup-container">
    <p class="school-name">Create Your Account<br>Life Fountain College</p>

    <div class="error-msg"   id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-group">
      <label for="newUsername">Username</label>
      <input type="text" id="newUsername" placeholder="Choose a username" autocomplete="username">
    </div>

    <div class="form-group">
      <label for="newPassword">Password</label>
      <input type="password" id="newPassword" placeholder="Choose a password" autocomplete="new-password">
    </div>
    <p class="password-hint">Minimum 6 characters</p>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat your password" autocomplete="new-password">
    </div>

    <button class="btn-primary" id="signupBtn" onclick="createAccount()">Create Account</button>
    <button class="btn-secondary" onclick="window.location.href='login.html'">Back to Login</button>
  </div>

  <footer>
    <p class="motto">"Bedrock of Excellence"</p>
    <p class="copyright">&copy; 2026 Life Fountain College, Ago Are/Ofiki. All rights reserved.</p>
  </footer>

  <script>
    /* ── ALREADY LOGGED IN ── */
    (function(){
      if(sessionStorage.getItem('loggedInUser')){
        window.location.replace('index.html');
      }
    })();

    /* ── HELPERS ── */
    function showError(msg){
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg){
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
    }

    function clearMessages(){
      document.getElementById('errorMsg').style.display   = 'none';
      document.getElementById('successMsg').style.display = 'none';
    }

    /* ── CREATE ACCOUNT ── */
    function createAccount(){
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value;
      const confirm  = document.getElementById('confirmPassword').value;
      clearMessages();

      if(!username || !password || !confirm){
        showError('Please fill in all fields.');
        return;
      }
      if(username.length < 3){
        showError('Username must be at least 3 characters.');
        return;
      }
      if(password.length < 6){
        showError('Password must be at least 6 characters.');
        return;
      }
      if(password !== confirm){
        showError('Passwords do not match.');
        return;
      }

      const btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(r => r.json())
      .then(resp => {
        if(resp.success){
          showSuccess('Account created! Redirecting to login…');
          setTimeout(() => window.location.replace('login.html'), 1500);
        } else {
          showError(resp.error || 'Could not create account.');
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      })
      .catch(() => {
        showError('Network error. Make sure the server is running.');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      });
    }

    /* ── ENTER KEY ── */
    document.addEventListener('keydown', function(e){
      if(e.key === 'Enter') createAccount();
    });
  </script>

</body>
</html>
